<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Purchase complete - Claims Auditor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0b0d0c; --panel:#111513; --line:#1f2723; --text:#e7ece9; --muted:#8a948e; --green:#2ecc71; --green-dim:#1d7a45;
    --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Instrument Sans',system-ui,sans-serif; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:var(--sans); display:flex; min-height:100vh; align-items:center; justify-content:center; padding:20px; }
  .card { width:100%; max-width:520px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:32px; }
  .badge { font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--green); margin-bottom:12px; }
  h1 { font-family:var(--mono); font-size:22px; margin:0 0 8px; }
  p { color:var(--muted); font-size:14px; line-height:1.5; }
  .code-box { margin:20px 0; background:#080a09; border:1px solid var(--green-dim); border-radius:8px; padding:18px; text-align:center; }
  .code { font-family:var(--mono); font-size:20px; font-weight:700; color:var(--green); letter-spacing:.04em; word-break:break-all; }
  .credits { font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:6px; }
  button { font-family:var(--mono); font-weight:600; font-size:13px; cursor:pointer; border:none; border-radius:8px; padding:11px 18px; }
  .copy { background:var(--panel); color:var(--green); border:1px solid var(--green-dim); margin-top:12px; }
  .go { background:var(--green); color:#06150c; margin-top:20px; text-decoration:none; display:inline-block; }
  .warn { color:#f5a623; font-size:13px; }
  a.link { color:var(--green); text-decoration:none; }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">Sandstorm Digital // Claims Auditor</div>
    <h1>Payment complete</h1>
    <div id="content"><p>Confirming your purchase...</p></div>
  </div>
<script>
  const params = new URLSearchParams(location.search);
  const sessionId = params.get('session_id');
  const content = document.getElementById('content');

  function esc(s){ const d=document.createElement('div'); d.textContent=s==null?'':s; return d.innerHTML; }

  async function load(attempt) {
    if (!sessionId) { content.innerHTML = '<p class="warn">No session found.</p>'; return; }
    try {
      const res = await fetch('/api/checkout/result?session_id=' + encodeURIComponent(sessionId));
      const data = await res.json();
      if (!res.ok || !data.code) {
        if ((attempt || 0) < 4) { setTimeout(() => load((attempt || 0) + 1), 1500); return; }
        content.innerHTML = '<p class="warn">We could not confirm the payment yet. If you were charged, contact support with your receipt.</p>';
        return;
      }
      content.innerHTML =
        '<p>Here is your access code. Save it - paste it into the auditor to use your credits.</p>' +
        '<div class="code-box"><div class="code" id="code">' + esc(data.code) + '</div>' +
        '<div class="credits">' + esc(data.credits) + ' page credits</div></div>' +
        '<button class="copy" id="copy">Copy code</button>' +
        '<br><a class="go" href="/">Start auditing</a>';
      document.getElementById('copy').addEventListener('click', () => {
        navigator.clipboard.writeText(data.code);
        document.getElementById('copy').textContent = 'Copied';
      });
    } catch (e) {
      content.innerHTML = '<p class="warn">Something went wrong confirming the purchase.</p>';
    }
  }
  load(0);
</script>
</body>
</html>
